<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Any to RTSP</title>
  <link rel="stylesheet" href="/style.css?v=3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>⟳</text></svg>" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">⟳</span>
      <div>
        <h1>ANY TO RTSP</h1>
        <span class="sub">STREAM CONVERTER <span style="background:#e0a526;color:#0a0c10;padding:2px 6px;font-size:10px;margin-left:8px;">DEV</span></span>
      </div>
    </div>
    <div class="health">
      <span id="healthDot" class="dot"></span>
      <span id="healthText">CHECKING…</span>
    </div>
  </header>

  <main>
    <!-- ADD SOURCE -->
    <section class="panel">
      <div class="panel-head">
        <h2>ADD SOURCE</h2>
      </div>

      <!-- Step 1: Pilih tipe sumber -->
      <div class="src-type-picker">
        <button class="src-type-btn" data-type="hls">
          <span class="st-icon">📡</span>
          <span class="st-label">HLS</span>
          <span class="st-desc">CCTV Link / M3U8</span>
        </button>
        <button class="src-type-btn" data-type="youtube">
          <span class="st-icon">▶</span>
          <span class="st-label">YouTube</span>
          <span class="st-desc">Live Stream URL</span>
        </button>
        <button class="src-type-btn" data-type="mp4">
          <span class="st-icon">📁</span>
          <span class="st-label">MP4 File</span>
          <span class="st-desc">Upload & Loop</span>
        </button>
      </div>

      <!-- Step 2: Form sesuai tipe -->
      <!-- HLS -->
      <form id="formHls" class="add-form src-form" data-type="hls" hidden>
        <div class="field">
          <label for="hls-name">NAME</label>
          <input id="hls-name" name="name" placeholder="cam_lobby" required autocomplete="off"
                 pattern="[a-z0-9][a-z0-9_\-]{0,62}" title="huruf kecil / angka / _ / -" />
        </div>
        <div class="field grow">
          <label for="hls-url">HLS URL</label>
          <input id="hls-url" name="hls_url" type="url" placeholder="https://sumber/playlist.m3u8" required autocomplete="off" />
        </div>
        <button type="submit" class="btn btn-primary">ADD</button>
        <button type="button" class="btn btn-ghost adv-toggle">ADVANCED</button>
      </form>

      <!-- YouTube -->
      <form id="formYt" class="add-form src-form" data-type="youtube" hidden>
        <div class="field">
          <label for="yt-name">NAME</label>
          <input id="yt-name" name="name" placeholder="puncak_live" required autocomplete="off"
                 pattern="[a-z0-9][a-z0-9_\-]{0,62}" title="huruf kecil / angka / _ / -" />
        </div>
        <div class="field grow">
          <label for="yt-url">YOUTUBE LIVE URL</label>
          <input id="yt-url" name="yt_url" type="url" placeholder="https://www.youtube.com/watch?v=..." required autocomplete="off" />
        </div>
        <button type="submit" class="btn btn-primary">ADD</button>
        <button type="button" class="btn btn-ghost adv-toggle">ADVANCED</button>
      </form>

      <!-- MP4 -->
      <div class="add-form src-form" data-type="mp4" hidden>
        <div class="field">
          <label for="mp4-name">NAME</label>
          <input id="mp4-name" name="name" placeholder="video_loop" required
                 pattern="[a-z0-9][a-z0-9_\-]{0,62}" title="huruf kecil / angka / _ / -" />
        </div>
        <div class="field dropzone" id="dropzone">
          <label>MP4 FILE (max 50MB)</label>
          <input type="file" id="mp4-file" accept=".mp4,.mov,.avi,.mkv,.ts" />
          <span class="dz-hint" id="dzHint">Select file or drag & drop</span>
          <span class="dz-name" id="dzName" hidden></span>
        </div>
        <button type="button" class="btn btn-primary" id="btnUploadMp4">UPLOAD & ADD</button>
        <button type="button" class="btn btn-ghost adv-toggle">ADVANCED</button>
      </div>

      <!-- Opsi lanjutan (shared) -->
      <div class="adv-box" hidden>
        <div class="field">
          <label>MODE</label>
          <select class="f-mode">
            <option value="auto">auto (detect codec)</option>
            <option value="copy">copy (passthrough)</option>
            <option value="transcode">transcode → H.264</option>
          </select>
        </div>
        <div class="field">
          <label>AUDIO</label>
          <select class="f-audio">
            <option value="aac">aac</option>
            <option value="copy">copy</option>
            <option value="drop">drop (no audio)</option>
          </select>
        </div>
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" class="f-fast" />
          <span style="font-size:11px; color:var(--text);">FAST START <em style="color:var(--dim); font-style:normal; font-size:10px;">(instant play)</em></span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" class="f-lowlat" />
          <span style="font-size:11px; color:var(--text);">LOW LATENCY <em style="color:var(--dim); font-style:normal; font-size:10px;">(live-edge)</em></span>
        </label>
      </div>
    </section>

    <!-- SOURCE LIST -->
    <section class="panel">
      <div class="panel-head">
        <h2>SOURCE LIST <span id="count" class="count">0</span></h2>
        <label class="auto"><input type="checkbox" id="autoRefresh" checked /> AUTO-REFRESH</label>
      </div>
      <div class="table-wrap">
        <table id="srcTable">
          <thead>
            <tr>
              <th>NAME</th><th>STATUS</th><th>CODEC</th><th>MODE</th>
              <th>RTSP URL</th><th class="num">VIEWERS</th><th>ACTIONS</th>
            </tr>
          </thead>
          <tbody id="srcBody">
            <tr><td colspan="7" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  
  <!-- ABOUT -->
  <section class="panel about-panel">
    <div class="panel-head about-head" id="aboutToggle">
      <h2>ABOUT <span class="about-arrow">▶</span></h2>
    </div>
    <div id="aboutBody" class="about-body" hidden>
      <div class="about-item">
        <span class="about-label">SOURCE CODE</span>
        <a href="https://github.com/chandramaulana/hls-to-rtsp-1" target="_blank" rel="noopener">github.com/chandramaulana/hls-to-rtsp-1</a>
      </div>
      <div class="about-item">
        <span class="about-label">BUILD</span>
        <span>2026-06-21 02:46 UTC · <code class="git-sha">4c96ea0</code></span>
      </div>
      <div class="about-item">
        <span class="about-label">VERSION</span>
        <span>2.0-dev</span>
      </div>
    </div>
  </section>
</main>

  <!-- MODAL -->
  <div id="modalOverlay" class="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <span id="modalIcon" class="modal-icon"></span>
        <h3 id="modalTitle">Judul</h3>
        <button class="modal-x" id="modalClose" aria-label="tutup">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div id="modalFoot" class="modal-foot"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" hidden></div>

  <script src="/app.js?v=3"></script>
</body>
</html>
