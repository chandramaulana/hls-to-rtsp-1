# go2rtc — RTSP server pengganti MediaMTX.
# Optimasi stabilitas: reconnect_at_eof + TCP default transport.
# (Parameter lain dikembalikan ke original biar gak timeout)

log:
  level: info

api:
  listen: ":1984"        # HTTP API + web UI (http://host:1984)

rtsp:
  listen: ":8554"        # RTSP konsumen, path-based: rtsp://host:8554/<nama>
  # Transport default gak bisa diset di sini untuk go2rtc versi ini
  # Biarkan FFmpeg yang handle transport

webrtc:
  listen: ":8555"        # opsional (preview WebRTC dashboard nanti)

ffmpeg:
  bin: ffmpeg
  # Template INPUT stabil — original dari repo, cuma ditambah reconnect_at_eof
  # agar transisi antar segmen HLS lebih mulus
  hlslive: "-rw_timeout 30000000 -reconnect 1 -reconnect_streamed 1 -reconnect_on_network_error 1 -reconnect_on_http_error 4xx,5xx -reconnect_delay_max 30 -m3u8_hold_counters 60 -max_reload 1000 -fflags +genpts -i {input}"
  # Template INPUT varian low-latency (reconnect_at_eof sudah ada)
  hlslowlat: "-rw_timeout 30000000 -reconnect 1 -reconnect_streamed 1 -reconnect_at_eof 1 -reconnect_on_network_error 1 -reconnect_delay_max 30 -live_start_index -1 -m3u8_hold_counters 60 -max_reload 1000 -fflags +genpts -i {input}"
  # Template OUTPUT fast-start (software)
  faststart_sw: "-c:v libx264 -preset veryfast -tune zerolatency -profile:v high -g 30 -force_key_frames expr:gte(t,n_forced*1) -b:v 2M"
  # Template OUTPUT fast-start (hardware)
  faststart_hw: "-c:v h264_nvmpi -profile:v high -g 30 -force_key_frames expr:gte(t,n_forced*1) -b:v 4M"

